# ============================================================
# Baseline ELOQUENT — Provider : Qwen 2.5 3B via Ollama
# Identique à baseline_groq mais sur modèle local
# ============================================================

run_id: "baseline_qwen_vanilla"

provider: "qwen_ollama"
model: "qwen2.5:3b"
ollama_base_url: "http://localhost:11434/v1"

languages:
  - "fr"
  - "it"
  - "en"
  - "es"
  - "de"

dataset_type: "specific"

generation:
  temperature: 0.0
  max_tokens: 150
  top_p: 1.0

prompting:
  strategy: "vanilla"

paths:
  input_dir: "data/input"
  output_dir: "data/output/runs"
